<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zakaria Yousri | Cybersecurity Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Inter", sans-serif;
}

body {
  background: linear-gradient(180deg, #03111f, #020b14);
  color: #fff;
}

/* ===== HERO ===== */

.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  padding: 80px;
}

.hero h1 {
  font-size: 72px;
  line-height: 1.1;
  font-weight: 900;
}

.gradient {
  background: linear-gradient(90deg,#10cfff,#21e47b);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  margin-top: 20px;
  color: #c5d1df;
  font-size: 20px;
}

.btn {
  margin-top: 20px;
  padding: 14px 25px;
  background: linear-gradient(90deg,#10cfff,#21e47b);
  border-radius: 10px;
  color: white;
  display: inline-block;
}

/* ===== IMAGE FIX ===== */

.hero-shield {
  width: 420px;
  max-width: 100%;
  display: block;
  margin: auto;
  filter: drop-shadow(0 0 40px rgba(0,255,200,.25));
}

/* ===== TERMINAL ===== */

.terminal {
  margin-top: 20px;
  border: 1px solid #21e47b;
  padding: 20px;
  border-radius: 12px;
  color: #21e47b;
  font-family: monospace;
}

/* ===== PROJECTS ===== */

.projects {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  padding: 60px;
}

.project-card {
  background: #06182a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(0,255,200,.15);
}

.project-img {
  text-align: center;
  margin-bottom: 15px;
}

.project-img img {
  width: 70px;
}

.project-card h3 {
  margin-bottom: 10px;
}

.tags {
  color: #21e47b;
  margin-top: 10px;
}

</style>
</head>

<body>

<section class="hero">

<div>
<h1>
I build secure,<br>
practical systems —<br>
<span class="gradient">not just projects.</span>
</h1>

<p>
Computer Engineering student focused on Cybersecurity,
Networking, and building real-world systems with security in mind.
</p>

Download CV
</a>

</div>

<div>

<!-- ✅ الصورة الأصلية -->
<img class="hero-shield" src="https://i.ibb.co/6c0d7G9/security-shield.png">

<div class="terminal">
> Building. Securing. Improving.<br>
Every day.
</div>

</div>

</section>

</body>
</html>
